name = "parthub-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ENV = "production"
JWT_EXPIRES_IN = "7d"

[[d1_databases]]
binding = "DB"
database_name = "parthub-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "parthub-media"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"

[env.development]
name = "parthub-api-dev"
[env.development.vars]
APP_ENV = "development"

[env.staging]
name = "parthub-api-staging"
[env.staging.vars]
APP_ENV = "staging"
